<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mini Advanced Card</title>
  <link rel="stylesheet" href="brbr.css">
</head>
<body>

  <div class="background-glow"></div>

  <div class="card">
    <div class="top">
      <span class="tag">PREMIUM</span>
      <div class="circle"></div>
    </div>

    <h1>Creative Dashboard</h1>
    <p>
      A modern glassmorphism UI card with smooth hover effects,
      animated gradients, and clean minimal design.
    </p>

    <div class="stats">
      <div>
        <h2>98%</h2>
        <span>Performance</span>
      </div>

      <div>
        <h2>24K</h2>
        <span>Users</span>
      </div>
    </div>

    <button id="btn">
      Explore Now
    </button>
  </div>

  <script src="script.js"></script>
</body>
</html>
